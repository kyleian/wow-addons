name: Discord Bot CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "discord-bot/**"
      - ".github/workflows/discord-bot-ci.yml"
      - ".github/workflows/deploy-discord-bot.yml"

  push:
    branches-ignore:
      - main          # main is handled by deploy-discord-bot.yml
    paths:
      - "discord-bot/**"
      - ".github/workflows/discord-bot-ci.yml"

  workflow_call:    # allow deploy-discord-bot.yml to call this as a dependency
    outputs:
      image_tag:
        description: "Short git SHA used as image tag"
        value: ${{ jobs.build.outputs.image_tag }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint Python source
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint bot source
        run: ruff check discord-bot/bot/ --output-format=github

      - name: Lint Pulumi infra source
        run: ruff check discord-bot/infra/ --output-format=github

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Security scan — Python (bandit + pip-audit)
  # ────────────────────────────────────────────────────────────────────────────
  security-python:
    name: Security Scan (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: bandit — static analysis for security issues
        run: |
          bandit -r discord-bot/bot/ \
            --severity-level medium \
            --confidence-level medium \
            --format txt

      - name: pip-audit — dependency vulnerability scan
        working-directory: discord-bot
        run: |
          pip install -r requirements.txt
          pip-audit --require-hashes=false -r requirements.txt

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Docker build (no push) + Trivy image scan
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: discord-bot
          file: discord-bot/Dockerfile
          push: false
          load: true             # load into local daemon so Trivy can scan it
          tags: discord-sentiment-bot:ci-${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: discord-sentiment-bot:ci-${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()    # upload even if Trivy found issues so results are visible
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Pulumi program validation (no AWS, no preview — just syntax + imports)
  # ────────────────────────────────────────────────────────────────────────────
  pulumi-validate:
    name: Pulumi Program Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: discord-bot/infra/requirements.txt

      - name: Install Pulumi Python SDK (no CLI needed for syntax check)
        working-directory: discord-bot/infra
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Check Pulumi program compiles (no AWS calls)
        working-directory: discord-bot/infra
        run: |
          source venv/bin/activate
          python -c "
          import ast, sys, pathlib
          src = pathlib.Path('__main__.py').read_text()
          try:
              ast.parse(src)
              print('Pulumi __main__.py: syntax OK')
          except SyntaxError as e:
              print(f'Syntax error: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Lint Pulumi program
        run: |
          pip install ruff --quiet
          ruff check discord-bot/infra/__main__.py --output-format=github

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Pulumi preview (only runs when AWS OIDC secrets are available,
  #         i.e. on PRs from the same repo — not forks)
  # ────────────────────────────────────────────────────────────────────────────
  pulumi-preview:
    name: Pulumi Preview
    runs-on: ubuntu-latest
    needs: [lint, security-python, build, pulumi-validate]

    # Skip on fork PRs (no access to secrets) and skip if PULUMI_ACCESS_TOKEN not configured
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.PULUMI_PREVIEW_ENABLED == 'true'

    permissions:
      id-token: write
      contents: read
      pull-requests: write   # to post the preview summary as a PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: GithubActions-DiscordBot-Preview

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: discord-bot/infra/requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Pulumi Python dependencies
        working-directory: discord-bot/infra
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Pulumi preview (dev stack)
        uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: dev
          work-dir: discord-bot/infra
          comment-on-pr: true
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
