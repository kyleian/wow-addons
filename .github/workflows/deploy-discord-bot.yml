name: Deploy Discord Sentiment Bot

on:
  push:
    branches:
      - master
    paths:
      - "discord-bot/**"
      - ".github/workflows/deploy-discord-bot.yml"
      - ".github/workflows/discord-bot-ci.yml"

  workflow_dispatch:
    inputs:
      stack:
        description: "Pulumi stack to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      running:
        description: "Set bot running state (true = start, false = stop)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# Required for OIDC authentication to AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PULUMI_STACK: ${{ inputs.stack || 'dev' }}
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 0: Run full CI gate (lint + security scan + Docker build + Trivy)
  #         Deploy is structurally blocked until every CI check passes.
  # ────────────────────────────────────────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/discord-bot-ci.yml

  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Build Docker image and push to ECR
  # ────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci   # ← deploy cannot proceed if any CI job failed

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActions-DiscordBot-Build

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retrieve ECR repo URL from Pulumi outputs (or derive it)
        id: ecr-url
        working-directory: discord-bot/infra
        run: |
          pip install pulumi pulumi-aws --quiet
          pulumi stack select ${{ env.PULUMI_STACK }} --non-interactive 2>/dev/null || true
          REPO_URL=$(pulumi stack output ecr_repository_url --stack ${{ env.PULUMI_STACK }} 2>/dev/null || echo "")
          if [ -z "$REPO_URL" ]; then
            # Derive from account/region if stack not yet deployed
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REPO_URL="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/discord-sentiment-bot-${{ env.PULUMI_STACK }}-discord-bot"
          fi
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "ECR repo: ${REPO_URL}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: discord-bot
          file: discord-bot/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-url.outputs.repo_url }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.ecr-url.outputs.repo_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy infrastructure with Pulumi
  # ────────────────────────────────────────────────────────────────────────
  deploy-infra:
    name: Pulumi Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActions-DiscordBot-Deploy

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: discord-bot/infra/requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Pulumi Python dependencies
        working-directory: discord-bot/infra
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Select Pulumi stack
        working-directory: discord-bot/infra
        run: pulumi stack select ${{ env.PULUMI_STACK }} --create
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Set image tag config
        working-directory: discord-bot/infra
        run: pulumi config set imageTag "${{ needs.build-and-push.outputs.image_tag }}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Set running state (if provided via workflow_dispatch)
        if: ${{ inputs.running != '' }}
        working-directory: discord-bot/infra
        run: pulumi config set running "${{ inputs.running }}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Pulumi up (deploy)
        working-directory: discord-bot/infra
        run: |
          source venv/bin/activate
          pulumi up --yes --skip-preview --refresh
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Show Pulumi outputs
        working-directory: discord-bot/infra
        run: |
          source venv/bin/activate
          pulumi stack output
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
