name: Release

# Trigger on version tags: git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package each addon into individual zips
        run: |
          mkdir -p dist
          for dir in addons/*/; do
            name=$(basename "$dir")
            (cd addons && zip -r "../dist/${name}-${{ steps.ver.outputs.VERSION }}.zip" "${name}/")
            echo "  Packaged: ${name}-${{ steps.ver.outputs.VERSION }}.zip"
          done
          echo ""
          echo "=== All packages ==="
          ls -1 dist/

      - name: Build combined SlySuite bundle (all addons in one zip)
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          BUNDLE="SlySuite-${VER}-full"
          mkdir -p "$BUNDLE"
          for dir in addons/*/; do
            cp -r "$dir" "${BUNDLE}/$(basename $dir)"
          done
          zip -r "dist/${BUNDLE}.zip" "${BUNDLE}/"
          echo "Bundle: dist/${BUNDLE}.zip"
          ls -lh "dist/${BUNDLE}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## Sly Suite v${{ steps.ver.outputs.VERSION }}

            TBC Anniversary (Interface 20505) addon suite.

            ### Addons
            | Addon | Description |
            |---|---|
            | **SlyChar** | Extended character sheet — stats, gear sets, social tab |
            | **SlyLoot** | SlyGargul — softres.it import + /roll tracker + loot announcer |
            | **ItemRackRevived** | Gear set manager — save/load/spec-link |
            | **SlySuite** | Addon loader and error sandbox |
            | **SlyRepair** | Auto-repair at merchants with cost reporting |
            | **SlyMount** | Smart mount picker with zone awareness |
            | **GearScore** | Gear score on tooltips and character pane |
            | **ExtendedCharStats** | Extended stat panel (spell power, hit, crit, haste) |
            | **SlyWeakAuras** | WeakAura pack manager |
            | **SlyAtlasLoot** | AtlasLoot drop % on tooltips |
            | **SlyItemizer** | Item compare + DPS delta on tooltips |
            | **SlySlot** | Action bar profile manager |
            | **SlyBag** | Unified bag window |
            | **SlyUF** | Custom unit frames |
            | **SlyMetrics** | Damage / healing / threat meter |

            See [commit history](https://github.com/${{ github.repository }}/commits) for full change log.

            ### Installation
            Extract any `.zip` directly into `Interface/AddOns/` in your WoW directory.
          files: dist/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: false

      - name: Upload combined bundle to CurseForge
        continue-on-error: true
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          if [ -z "$CF_API_KEY" ] || [ -z "$CF_PROJECT_ID" ]; then
            echo "CF secrets not set - skipping CurseForge upload."
            exit 0
          fi
          BUNDLE="dist/SlySuite-${VERSION}-full.zip"

          # ----------------------------------------------------------------
          # Step 1: Resolve the Burning Crusade Classic game version TYPE ID.
          # The CurseForge App filters by gameVersionTypeID, not by version
          # name strings. Without the correct type, the app won't list the
          # file even if it appears on the website.
          # Known stable fallback: 73713 = Burning Crusade Classic
          # ----------------------------------------------------------------
          echo "Fetching CurseForge game version types..."
          CF_VERSION_TYPES=$(curl -s -H "X-Api-Token: $CF_API_KEY" \
            "https://wow.curseforge.com/api/game/2/version-types")
          echo "Version types response: $CF_VERSION_TYPES"

          TBC_TYPE_ID=$(echo "$CF_VERSION_TYPES" | \
            jq -r '[.[] | select(.name | test("Burning Crusade|burning.crusade|TBC Classic|tbc_classic"; "i")) | .id] | first // empty' \
            2>/dev/null || echo "")

          if [ -z "$TBC_TYPE_ID" ]; then
            echo "WARNING: could not detect TBC type ID from API — using hardcoded fallback 73246"
            # 73246 = Burning Crusade Classic  (NOT 73713 which is WotLK Classic)
            TBC_TYPE_ID="73246"
          fi
          echo "Using gameVersionTypeID: $TBC_TYPE_ID"

          # ----------------------------------------------------------------
          # Step 2: Fetch all game versions and filter by the TBC type ID.
          # This correctly handles TBC Anniversary (same type as TBC Classic,
          # interface 20505 / patch 2.5.5) without relying on name patterns
          # that can break when Blizzard adds anniversary variants.
          # ----------------------------------------------------------------
          echo "Fetching CurseForge game versions..."
          CF_VERSIONS=$(curl -s -H "X-Api-Token: $CF_API_KEY" \
            "https://wow.curseforge.com/api/game/versions")

          # Primary: filter by resolved type ID
          GAME_VERSION_IDS=$(echo "$CF_VERSIONS" | \
            jq -r --argjson TYPE "$TBC_TYPE_ID" \
            '[.[] | select(.gameVersionTypeID == $TYPE) | .id] | join(",")' \
            2>/dev/null || echo "")

          # Fallback: name-based 2.5.x filter (catches renamed anniversary entries)
          if [ -z "$GAME_VERSION_IDS" ]; then
            echo "WARNING: type-ID filter returned no versions; falling back to 2.5.x name pattern"
            GAME_VERSION_IDS=$(echo "$CF_VERSIONS" | \
              jq -r '[.[] | select(.name | test("^2\\.5\\.")) | .id] | join(",")' \
              2>/dev/null || echo "")
          fi

          # Hard fallback: known CF IDs for TBC Classic 2.5.1–2.5.5
          if [ -z "$GAME_VERSION_IDS" ]; then
            echo "WARNING: no TBC versions found via API — using hardcoded fallback IDs"
            GAME_VERSION_IDS="9546,9560,9561,14301,14300"
          fi

          echo "Using game version IDs: $GAME_VERSION_IDS"

          # ----------------------------------------------------------------
          # Step 3: Upload. Including gameVersionTypeID in metadata is the
          # critical field that makes the file appear in the CF App's
          # "Burning Crusade Classic" filter rather than being invisible.
          # ----------------------------------------------------------------
          echo "Uploading $BUNDLE to CurseForge project $CF_PROJECT_ID..."
          METADATA=$(jq -n \
            --arg cl "https://github.com/kyleian/wow-addons/releases/tag/v${VERSION}" \
            --arg dn "SlySuite v${VERSION}" \
            --argjson gv "[$GAME_VERSION_IDS]" \
            --argjson gvt "$TBC_TYPE_ID" \
            '{changelog: $cl, changelogType: "text", displayName: $dn, gameVersions: $gv, gameVersionTypeID: $gvt, releaseType: "release"}')
          echo "Metadata: $METADATA"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=${METADATA}" \
            -F "file=@${BUNDLE}" \
            "https://wow.curseforge.com/api/projects/${CF_PROJECT_ID}/upload-file")
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Response: $BODY"
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -gt 299 ]; then
            echo "CurseForge upload failed with HTTP $STATUS"
            exit 1
          fi
          echo "CurseForge upload successful!"
